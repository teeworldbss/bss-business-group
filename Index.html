<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS Business Group</title>
    <style>
        :root { --wa-header: #075e54; --wa-bg: #e5ddd5; }
        body { font-family: sans-serif; margin: 0; background: var(--wa-bg); display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--wa-header); color: white; padding: 15px; font-weight: bold; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; max-width: 80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .bot { background: white; align-self: flex-start; }
        .user { background: #dcf8c6; align-self: flex-end; }
        .input-box { padding: 10px; background: #f0f0f0; display: flex; gap: 10px; }
        input { flex: 1; border: none; padding: 12px; border-radius: 20px; outline: none; }
        button { background: var(--wa-header); color: white; border: none; border-radius: 50%; width: 40px; cursor: pointer; }
    </style>
</head>
<body>
    <header>BSS Business Group | Node v2.2.6</header>
    <div id="chat"><div class="msg bot">Welcome. Type a number:<br>1. Register<br>2. Market<br>3. Stats</div></div>
    <div class="input-box">
        <input type="text" id="in" placeholder="Type a number...">
        <button onclick="send()">➤</button>
    </div>
    <script>
        const API = "https://bss-bizgroup-api-480387776403.us-central1.a.run.app/api/simulate";
        async function send() {
            const val = document.getElementById('in').value;
            if(!val) return;
            add(val, 'user');
            document.getElementById('in').value = '';
            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: val})
                });
                const data = await res.json();
                add(data.reply, 'bot');
            } catch(e) { add("⚠️ Connection Error", 'bot'); }
        }
        function add(t, s) {
            const d = document.createElement('div');
            d.className = `msg ${s}`; d.innerHTML = t;
            document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = 9999;
        }
    </script>
</body>
</html>
