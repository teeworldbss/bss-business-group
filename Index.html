<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS Business Group | Official Node</title>
    <style>
        :root {
            --primary: #0088cc; /* Telegram Blue */
            --dark: #24292e;
            --light: #f6f8fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 { margin-bottom: 10px; font-size: 1.8rem; }
        p { color: #666; line-height: 1.6; margin-bottom: 30px; }
        .bot-link {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        .bot-link:hover {
            background-color: #0077b5;
            transform: translateY(-2px);
        }
        .badge {
            background: #e1f5fe;
            color: #01579b;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">SYSTEM NODE: BSS-ROOT-001</div>
        <h1>BSS Business Group</h1>
        <p>
            Welcome to the high-fidelity student management and marketplace simulation. 
            All operations are now handled through our automated Telegram interface.
        </p>

        <a href="https://t.me/Bss_business_bot" class="bot-link" target="_blank">
            Launch Telegram Bot
        </a>
    </div>

    <footer>
        &copy; 2026 Taiwo Fashola | BSS Core Engine v2.2.6
    </footer>

</body>
</html>
